name: RTL Verification CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  regression-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Pull Toolchain Image (or build fallback)
        working-directory: infra
        run: docker compose pull fledge-dev || docker compose build fledge-dev

      - name: Run example_counter testbench
        working-directory: infra
        run: docker compose run --rm --pull never fledge-dev bash -c "cd hw/ip/example_counter/dv && make"
